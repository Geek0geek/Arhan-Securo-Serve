<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARHAN Securo Serve Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="ARHAN Securo Serve Logo" id="logo" class="animated-logo">
        </div>
        <div id="login-form">
            <h1>ARHAN Securo Serve</h1>
            <label for="user-id">User ID:</label>
            <input type="text" id="user-id" placeholder="Enter User ID">
            <div id="user-id-error" class="error-message hidden">Please enter your User ID.</div>
            
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter Password">
            <div id="password-error" class="error-message hidden">Please enter your password.</div>
            
            <label for="captcha">Captcha: <span id="captcha"></span></label>
            <input type="text" id="captcha-input" placeholder="Enter Captcha">
            <div id="captcha-error" class="error-message hidden">Please enter the captcha.</div>
            
            <button onclick="validateLogin()">Login</button>
        </div>
        <div id="video-container" class="hidden">
            <video id="video" controls>
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
